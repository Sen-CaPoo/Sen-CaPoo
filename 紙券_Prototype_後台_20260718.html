<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>王品集團紙本票券訂購網 管理後台 | Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@600;700;900&display=swap" rel="stylesheet">
<style>
/* ============ 基礎(design tokens 沿用前台 Prototype v1.1,客戶已確認) ============ */
:root{
  --wine:#8A1B29; --wine-d:#701221; --wine-x:#4E0C16; --wine-bright:#B02A3A;
  --gold:#B08D4A; --gold-l:#D8B878; --gold-pale:#F3E7CC;
  --cream:#F6F1E7; --card:#FFFFFF;
  --ink:#2E2A26; --muted:#8A8178; --line:#E7DFD2;
  --orange:#E07B1F; --orange-bg:#FDF3E2;
  --ok:#2E7D46; --ok-bg:#E8F3EC; --err:#C0392B; --err-bg:#FBEBE8;
  --info-bg:#EDF1F6; --info-ink:#5A6B7E;
  --amber:#B07A18; --amber-bg:#FBF3DF;
  --blue:#2A5B8F; --blue-bg:#E8EFF7;
  --teal:#1E7A70; --teal-bg:#E4F2F0;
  --purple:#6B4E9B; --purple-bg:#EFEAF8;
  --gray:#767066; --gray-bg:#EFECE5;
  --shadow:0 2px 10px rgba(78,12,22,.08);
  --shadow-lg:0 12px 40px rgba(46,42,38,.18);
  --radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif;background:var(--cream);color:var(--ink);font-size:15px;line-height:1.65;-webkit-font-smoothing:antialiased}
img{max-width:100%;display:block}
a{color:var(--wine);text-decoration:none}
a:hover{text-decoration:underline}
button{font-family:inherit;font-size:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:15px;color:var(--ink)}
.serif{font-family:'Noto Serif TC','PMingLiU',serif}
.hidden{display:none!important}
.muted{color:var(--muted)}
::placeholder{color:#B9B0A4}

/* ============ 需求對照標籤 ============ */
[data-req]{position:relative}
body.show-req [data-req]::before{
  content:"需求 §" attr(data-req);
  position:absolute;top:-10px;left:-6px;z-index:60;
  background:#1F6FEB;color:#fff;font-size:11px;font-weight:700;letter-spacing:.5px;
  padding:2px 8px;border-radius:99px;box-shadow:0 2px 6px rgba(31,111,235,.4);
  font-family:'Noto Sans TC',sans-serif;white-space:nowrap;pointer-events:none;line-height:1.6;
}
body.show-req [data-req]{outline:1.5px dashed rgba(31,111,235,.55);outline-offset:4px;border-radius:6px}

/* ============ Prototype 頂條 ============ */
.proto-strip{background:#241B16;color:#CBBFAE;font-size:12.5px;letter-spacing:.4px;position:relative;z-index:120}
.proto-strip .pwrap{display:flex;align-items:center;gap:14px;min-height:34px;flex-wrap:wrap;padding:0 18px}
.proto-strip b{color:var(--gold-l);font-weight:700}
.proto-strip .sp{flex:1}
.proto-btn{border:1px solid #5A4C3E;color:#E4D9C6;border-radius:99px;padding:1px 12px;font-size:12px;transition:.15s}
.proto-btn:hover,.proto-btn.on{background:var(--gold);border-color:var(--gold);color:#241B16}

/* ============ 登入頁 ============ */
.login-wrap{min-height:calc(100vh - 34px);display:flex;align-items:center;justify-content:center;padding:40px 16px;
  background-image:repeating-linear-gradient(-45deg,rgba(255,255,255,.03) 0 2px,transparent 2px 10px),linear-gradient(135deg,var(--wine-d),var(--wine-x));}
.login-card{background:#fff;border-radius:16px;box-shadow:var(--shadow-lg);width:100%;max-width:460px;padding:38px 40px 34px;position:relative}
.login-card::before{content:"";position:absolute;top:0;left:0;right:0;height:5px;border-radius:16px 16px 0 0;background:linear-gradient(90deg,var(--wine),var(--gold))}
.login-logo{text-align:center;margin-bottom:6px;font-family:'Noto Serif TC',serif;font-size:30px;font-weight:900;letter-spacing:2px}
.login-logo .l1{color:var(--wine)}.login-logo .l2{color:var(--gold)}
.login-sys{text-align:center;font-size:14px;color:var(--muted);letter-spacing:3px;margin-bottom:4px}
.login-env{display:flex;justify-content:center;margin-bottom:20px}
.env-chip{display:inline-flex;align-items:center;gap:7px;background:var(--ok-bg);color:var(--ok);font-size:12.5px;font-weight:700;border-radius:99px;padding:3px 14px}
.env-chip .dot{width:8px;height:8px;border-radius:99px;background:var(--ok)}
.env-chip.bad{background:var(--err-bg);color:var(--err)}
.env-chip.bad .dot{background:var(--err)}
.login-note{background:var(--info-bg);color:var(--info-ink);font-size:13px;border-radius:8px;padding:9px 13px;margin:14px 0;display:flex;gap:8px;line-height:1.55}
.demo-note{background:#FFF9E3;border:1.5px dashed #E3C55A;color:#8A6D1A;font-size:12.5px;border-radius:8px;padding:9px 13px;margin-top:16px;line-height:1.7}
.login-foot{text-align:center;color:var(--muted);font-size:12px;margin-top:20px;line-height:1.8}

/* ============ 後台版面 ============ */
.admin{display:flex;min-height:calc(100vh - 34px)}
.side{width:230px;flex:none;background:linear-gradient(180deg,var(--wine-x) 0%,var(--wine-d) 100%);color:#E9D9C8;
  position:sticky;top:0;height:calc(100vh - 34px);overflow-y:auto;z-index:90;display:flex;flex-direction:column}
.side::-webkit-scrollbar{width:5px}
.side::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18);border-radius:99px}
.s-logo{padding:18px 18px 14px;border-bottom:1px solid rgba(216,184,120,.25)}
.s-logo .t{font-family:'Noto Serif TC',serif;font-size:21px;font-weight:900;letter-spacing:1.5px;color:#fff;cursor:pointer}
.s-logo .t .g{color:var(--gold-l)}
.s-logo small{display:block;font-size:11px;letter-spacing:2.5px;color:#C9A97F;margin-top:2px}
.s-nav{padding:10px 10px 16px;flex:1}
.s-group{font-size:11px;letter-spacing:2px;color:#B98F6A;padding:14px 10px 6px;font-weight:700}
.s-link{display:flex;align-items:center;gap:9px;width:100%;text-align:left;padding:9px 10px;border-radius:9px;font-size:14px;color:#EBDCC9;transition:.15s;position:relative;line-height:1.4}
.s-link:hover{background:rgba(255,255,255,.08)}
.s-link.on{background:rgba(216,184,120,.16);color:#fff;font-weight:700}
.s-link.on::before{content:"";position:absolute;left:-10px;top:7px;bottom:7px;width:3.5px;border-radius:0 4px 4px 0;background:var(--gold-l)}
.s-link .no{flex:none;width:20px;height:20px;border-radius:6px;background:rgba(216,184,120,.18);color:var(--gold-l);font-size:11px;font-weight:700;display:inline-flex;align-items:center;justify-content:center}
.s-link .nb{margin-left:auto;background:var(--wine-bright);color:#fff;font-size:10.5px;font-weight:700;border-radius:99px;padding:0 7px;line-height:1.7}
.s-link.sub{padding-left:39px;font-size:13.5px;color:#D9C6AE}
.s-foot{padding:12px 18px;border-top:1px solid rgba(216,184,120,.2);font-size:11px;color:#B98F6A;line-height:1.7}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:80;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;padding:0 22px;min-height:56px}
.tb-burger{display:none;width:38px;height:38px;border:1px solid var(--line);border-radius:9px;font-size:17px;color:var(--wine)}
.tb-crumb{font-size:14px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-crumb b{color:var(--ink);font-weight:700}
.tb-sp{flex:1}
.tb-btn{position:relative;display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:99px;padding:6px 14px;font-size:13px;color:#5C544A;transition:.15s;background:#fff;white-space:nowrap}
.tb-btn:hover{border-color:var(--gold);color:var(--wine)}
.tb-btn .cnt{position:absolute;top:-6px;right:-4px;background:var(--wine-bright);color:#fff;font-size:10.5px;font-weight:700;border-radius:99px;min-width:17px;height:17px;display:inline-flex;align-items:center;justify-content:center;padding:0 4px}
.tb-user{display:flex;align-items:center;gap:9px;border-left:1px solid var(--line);padding-left:14px;margin-left:4px}
.tb-user .av{width:34px;height:34px;border-radius:99px;background:linear-gradient(135deg,var(--wine),var(--wine-x));color:#F3E2B9;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif TC',serif}
.tb-user .nm{font-size:13.5px;font-weight:700;line-height:1.3}
.tb-user .rl{font-size:11.5px;color:var(--muted);line-height:1.3}
.content{padding:22px 26px 60px;max-width:1560px;width:100%;margin:0 auto}

/* ============ 頁面標題 ============ */
.page-head{display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap;margin-bottom:16px}
.ph-txt{flex:1;min-width:260px}
.ph-title{font-family:'Noto Serif TC',serif;font-size:24px;font-weight:900;color:var(--wine);letter-spacing:1px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.ph-title .bk{font-size:13px;color:var(--muted);font-family:'Noto Sans TC',sans-serif;font-weight:500;letter-spacing:0;cursor:pointer;border:1px solid var(--line);background:#fff;border-radius:99px;padding:4px 13px;transition:.15s}
.ph-title .bk:hover{border-color:var(--wine);color:var(--wine)}
.ph-sub{color:var(--muted);font-size:13.5px;margin-top:3px;line-height:1.6}
.ph-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}

/* ============ 按鈕 ============ */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border-radius:9px;padding:9px 18px;font-size:14px;font-weight:700;letter-spacing:.5px;transition:.16s;white-space:nowrap;border:1.5px solid transparent}
.btn.pri{background:var(--wine);color:#fff}
.btn.pri:hover{background:var(--wine-d)}
.btn.sec{background:#fff;border-color:var(--wine);color:var(--wine)}
.btn.sec:hover{background:#FDF7F2}
.btn.gold{background:var(--gold);color:#fff}
.btn.gold:hover{background:#9A7A3C}
.btn.ghost{background:#fff;border-color:var(--line);color:#5C544A}
.btn.ghost:hover{border-color:var(--gold);color:var(--wine)}
.btn.warn{background:#fff;border-color:var(--err);color:var(--err)}
.btn.warn:hover{background:var(--err-bg)}
.btn.warn-solid{background:var(--err);color:#fff}
.btn.warn-solid:hover{background:#A93226}
.btn.ok-solid{background:var(--ok);color:#fff}
.btn.ok-solid:hover{background:#256B3B}
.btn.sm{padding:5px 12px;font-size:12.5px;border-radius:7px;font-weight:500}
.btn.xs{padding:2px 10px;font-size:12px;border-radius:6px;font-weight:500}
.btn:disabled,.btn.dis{opacity:.45;cursor:not-allowed;filter:grayscale(.4)}
.btn .ic{font-size:15px;line-height:1}

/* ============ 徽章 ============ */
.bdg{display:inline-flex;align-items:center;gap:5px;border-radius:99px;padding:1px 11px;font-size:12.5px;font-weight:700;white-space:nowrap;line-height:1.8}
.bdg::before{content:"";width:6px;height:6px;border-radius:99px;background:currentColor;opacity:.75}
.bdg.b-amber{background:var(--amber-bg);color:var(--amber)}
.bdg.b-blue{background:var(--blue-bg);color:var(--blue)}
.bdg.b-teal{background:var(--teal-bg);color:var(--teal)}
.bdg.b-green{background:var(--ok-bg);color:var(--ok)}
.bdg.b-red{background:var(--err-bg);color:var(--err)}
.bdg.b-orange{background:var(--orange-bg);color:#B4691C}
.bdg.b-purple{background:var(--purple-bg);color:var(--purple)}
.bdg.b-gray{background:var(--gray-bg);color:var(--gray)}
.bdg.b-wine{background:#F6E4E6;color:var(--wine)}
.tag{display:inline-block;border-radius:6px;padding:0 8px;font-size:11.5px;font-weight:700;line-height:1.9;white-space:nowrap}
.tag.t-src{background:var(--info-bg);color:var(--info-ink)}
.tag.t-gold{background:var(--gold-pale);color:#7A5C1E}
.tag.t-ret{background:var(--orange-bg);color:#B4691C;border:1px solid #EFC08A}
.tag.t-lock{background:var(--gray-bg);color:var(--gray)}

/* ============ 面板 ============ */
.panel{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid rgba(231,223,210,.7);padding:20px 22px;margin-bottom:16px}
.panel-title{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:700;margin-bottom:14px;flex-wrap:wrap}
.panel-title::before{content:"";width:5px;height:18px;border-radius:3px;background:var(--gold);flex:none}
.panel-title .opt{font-size:12.5px;color:var(--muted);font-weight:400}
.panel-title .rgt{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.eye-btn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:99px;padding:3px 13px;font-size:12.5px;color:#5C544A;transition:.15s;background:#fff}
.eye-btn:hover{border-color:var(--gold);color:var(--wine)}
.eye-btn.unlocked{background:var(--gold-pale);border-color:var(--gold);color:#7A5C1E;font-weight:700}

/* ============ 查詢列 ============ */
.fbar{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid rgba(231,223,210,.7);padding:16px 18px 14px;margin-bottom:14px}
.fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px 14px}
.ff label{display:block;font-size:12px;font-weight:700;color:#6B6155;margin-bottom:4px;letter-spacing:.5px}
.ff label .hint{font-weight:400;color:var(--muted);font-size:11px;margin-left:4px}
.ff .in,.ff select{width:100%;height:37px;border:1.5px solid var(--line);border-radius:8px;padding:0 11px;background:#fff;transition:.15s;font-size:13.5px}
.ff .in:focus,.ff select:focus{outline:none;border-color:var(--gold)}
.ff .rng{display:flex;align-items:center;gap:6px}
.ff .rng .in{flex:1;min-width:0}
.f-actions{display:flex;gap:8px;align-items:flex-end;justify-content:flex-end;margin-top:12px;flex-wrap:wrap}
.f-note{font-size:12px;color:var(--muted);margin-right:auto;align-self:center}
.chips{display:flex;gap:6px;flex-wrap:wrap;padding-top:3px}
.chip{display:inline-flex;align-items:center;gap:5px;border:1.5px solid var(--line);border-radius:99px;padding:3px 12px;font-size:12.5px;color:#5C544A;cursor:pointer;transition:.15s;background:#fff;user-select:none}
.chip:hover{border-color:var(--gold)}
.chip.on{border-color:var(--wine);color:var(--wine);background:#FDF7F2;font-weight:700}

/* ============ 列表工具列/表格/分頁 ============ */
.list-tools{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.list-tools .total{font-size:13px;color:var(--muted)}
.list-tools .total b{color:var(--wine);font-size:15px}
.list-tools .sp{flex:1}
.tbl-wrap{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid rgba(231,223,210,.7);overflow:auto;margin-bottom:12px}
table.tbl{width:100%;border-collapse:collapse;min-width:640px}
.tbl th{background:#FBF8F1;color:#6B6155;font-size:12.5px;font-weight:700;text-align:left;padding:10px 13px;border-bottom:1.5px solid var(--line);white-space:nowrap;letter-spacing:.5px;position:sticky;top:0;z-index:5}
.tbl td{padding:10px 13px;border-bottom:1px solid #F0EADD;font-size:13.5px;vertical-align:middle}
.tbl tbody tr{transition:.12s}
.tbl tbody tr:hover{background:#FDFBF5}
.tbl tbody tr:last-child td{border-bottom:none}
.tbl .num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
.tbl .mono{font-variant-numeric:tabular-nums;white-space:nowrap}
.tbl .op{white-space:nowrap;text-align:right}
.tbl a.lk{font-weight:700}
.tbl .empty{text-align:center;color:var(--muted);padding:46px 10px;font-size:14px}
.tbl .sortmark{font-size:10px;opacity:.6;margin-left:2px}
.pager{display:flex;align-items:center;gap:8px;justify-content:flex-end;flex-wrap:wrap;font-size:13px;color:var(--muted)}
.pg-btn{min-width:30px;height:30px;border:1px solid var(--line);border-radius:8px;background:#fff;color:#5C544A;font-size:13px;display:inline-flex;align-items:center;justify-content:center;padding:0 8px;transition:.15s}
.pg-btn:hover{border-color:var(--gold);color:var(--wine)}
.pg-btn.on{background:var(--wine);border-color:var(--wine);color:#fff;font-weight:700}
.pg-btn:disabled{opacity:.4;cursor:not-allowed}
.per-sel{height:30px;border:1px solid var(--line);border-radius:8px;background:#fff;font-size:12.5px;padding:0 8px}

/* ============ 頁籤 ============ */
.tabbar{display:flex;gap:2px;border-bottom:2px solid var(--line);margin-bottom:16px;flex-wrap:wrap}
.tab{padding:9px 20px;font-size:14.5px;font-weight:700;color:var(--muted);border-radius:10px 10px 0 0;position:relative;transition:.15s;bottom:-2px;border-bottom:2.5px solid transparent}
.tab:hover{color:var(--wine)}
.tab.on{color:var(--wine);border-bottom-color:var(--wine);background:linear-gradient(180deg,transparent,#FDF7F2)}
.tab .n{font-size:11.5px;background:var(--gray-bg);color:var(--gray);border-radius:99px;padding:0 7px;margin-left:5px}
.tab.on .n{background:#F6E4E6;color:var(--wine)}
</style>
<style>
/* ============ KV 資訊格 ============ */
.kv{display:grid;grid-template-columns:150px 1fr;gap:0;font-size:13.5px;border-top:1px solid #F0EADD}
.kv>.k{padding:9px 12px 9px 2px;color:#6B6155;font-weight:700;border-bottom:1px solid #F0EADD;background:transparent;line-height:1.55}
.kv>.v{padding:9px 2px;border-bottom:1px solid #F0EADD;line-height:1.55;min-width:0;word-break:break-all}
.kv>.v .sub{display:block;font-size:12px;color:var(--muted);margin-top:1px}
.kv2{display:grid;grid-template-columns:150px 1fr 150px 1fr;gap:0 18px}
@media (max-width:900px){.kv2{grid-template-columns:150px 1fr}}
.mask-val{letter-spacing:1px}
.unlock-log{background:#FBF8F1;border:1px dashed var(--line);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--muted);margin-top:10px;line-height:1.8}
.unlock-log b{color:#7A5C1E}

/* ============ 表單 ============ */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px 18px}
.form-grid .full{grid-column:1/-1}
@media (max-width:820px){.form-grid{grid-template-columns:1fr}}
.field label{display:block;font-size:13px;font-weight:700;color:#55504A;margin-bottom:5px}
.field label .req{color:var(--err);margin-right:2px}
.field label .why{font-weight:400;color:var(--muted);font-size:11.5px;margin-left:6px}
.in{width:100%;height:40px;border:1.5px solid var(--line);border-radius:9px;padding:0 12px;background:#fff;transition:.15s;font-size:14px}
.in:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(176,141,74,.12)}
.in:disabled,.in[readonly]{background:#F5F1E8;color:#8A8178;cursor:not-allowed}
.in.bad{border-color:var(--err)}
textarea.in{height:auto;min-height:88px;padding:9px 12px;line-height:1.6;resize:vertical}
select.in{appearance:none;background-image:url('data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%2712%27 height=%278%27%3E%3Cpath d=%27M1 1l5 5 5-5%27 stroke=%27%238A8178%27 stroke-width=%272%27 fill=%27none%27/%3E%3C/svg%3E');background-repeat:no-repeat;background-position:right 12px center;padding-right:32px}
select.in:disabled{opacity:.75}
.help{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.55}
.fmsg{display:none;font-size:12.5px;margin-top:4px;line-height:1.5}
.fmsg.show{display:block}
.fmsg.bad{color:var(--err)}
.fmsg.good{color:var(--ok)}
.cnt-note{font-size:12px;color:var(--muted);text-align:right;margin-top:3px}
.cnt-note.over{color:var(--err);font-weight:700}
.seg{display:inline-flex;background:#fff;border:1.5px solid var(--line);border-radius:99px;padding:3px;gap:2px}
.seg button{padding:6px 16px;border-radius:99px;font-size:13.5px;color:#5C544A;transition:.15s;font-weight:500}
.seg button.on{background:var(--wine);color:#fff;font-weight:700}
.ck{display:flex;align-items:flex-start;gap:8px;font-size:13.5px;cursor:pointer;line-height:1.6;user-select:none}
.ck input{width:17px;height:17px;accent-color:var(--wine);margin-top:3px;flex:none;cursor:pointer}
.radio-row{display:flex;gap:14px;flex-wrap:wrap;padding-top:4px}
.radio-row .ck input{border-radius:99px}
.tel3{display:flex;gap:6px;align-items:center}
.tel3 .in{text-align:center}
.tel3 .d{color:var(--muted);flex:none}
.pfx{display:flex;align-items:stretch}
.pfx .p{flex:none;display:flex;align-items:center;background:#F5F1E8;border:1.5px solid var(--line);border-right:none;border-radius:9px 0 0 9px;padding:0 10px;font-size:13px;color:#6B6155}
.pfx .in{border-radius:0 9px 9px 0}

/* ============ 提示框 ============ */
.note{border-radius:9px;padding:9px 13px;font-size:13px;line-height:1.6;display:flex;gap:8px;align-items:flex-start;margin:9px 0}
.note .ni{flex:none}
.note.info{background:var(--info-bg);color:var(--info-ink)}
.note.warn{background:#FFF9E3;border:1px dashed #E3C55A;color:#8A6D1A}
.note.err{background:var(--err-bg);color:var(--err)}
.note.ok{background:var(--ok-bg);color:var(--ok)}
.note.rule{background:#FBF8F1;border:1px solid var(--line);color:#6B6155;font-size:12.5px}

/* ============ 彈窗 ============ */
.ovl{position:fixed;inset:0;background:rgba(36,27,22,.55);backdrop-filter:blur(2px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
@keyframes fadein{from{transform:translateY(4px)}to{transform:none}}
.dlg{background:#fff;border-radius:14px;box-shadow:var(--shadow-lg);width:100%;max-width:520px;max-height:88vh;overflow:auto;animation:pop .2s}
.dlg.w-lg{max-width:760px}
.dlg.w-xl{max-width:980px}
@keyframes pop{from{transform:translateY(14px) scale(.98)}to{transform:none}}
.dlg-head{display:flex;align-items:center;gap:10px;padding:16px 22px 12px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff;z-index:5;border-radius:14px 14px 0 0}
.dlg-head h3{font-size:17px;font-weight:700;color:var(--wine);flex:1;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.dlg-x{width:32px;height:32px;border-radius:99px;font-size:15px;color:var(--muted);transition:.15s;flex:none}
.dlg-x:hover{background:var(--cream);color:var(--ink)}
.dlg-body{padding:18px 22px}
.dlg-foot{display:flex;justify-content:flex-end;gap:9px;padding:13px 22px 18px;border-top:1px solid var(--line);flex-wrap:wrap}
.confirm-box{background:#FBF8F1;border:1px solid var(--line);border-radius:10px;padding:13px 16px;margin:10px 0;font-size:13.5px}
.confirm-box .row{display:flex;justify-content:space-between;gap:14px;padding:3px 0}
.confirm-box .row .ck2{color:#6B6155;flex:none}
.confirm-box .row .cv{font-weight:700;text-align:right;word-break:break-all}

/* ============ Toast ============ */
#toasts{position:fixed;top:46px;right:18px;z-index:400;display:flex;flex-direction:column;gap:9px;pointer-events:none;max-width:400px}
.toast{pointer-events:auto;background:#3A322B;color:#fff;font-size:13.5px;border-radius:10px;padding:11px 16px;box-shadow:var(--shadow-lg);line-height:1.55;animation:tin .25s}
@keyframes tin{from{transform:translateX(16px)}to{transform:none}}
.toast.ok{background:var(--ok)}
.toast.err{background:var(--err)}
.toast.mail{background:#1E4E79;border-left:4px solid #6FA8DC}
.toast.line{background:#06C755;font-weight:500}
.toast a{color:#FFE9A8}
.toast b{color:#FFE9A8}

/* ============ 任務佇列抽屜 ============ */
.drw-ovl{position:fixed;inset:0;background:rgba(36,27,22,.35);z-index:180}
.drw{position:fixed;top:0;right:0;bottom:0;width:400px;max-width:92vw;background:#fff;z-index:190;box-shadow:-8px 0 30px rgba(46,42,38,.2);display:flex;flex-direction:column;animation:slidein .22s}
@keyframes slidein{from{transform:translateX(30px)}to{transform:none}}
.drw-head{display:flex;align-items:center;gap:10px;padding:16px 20px;border-bottom:1px solid var(--line)}
.drw-head h3{font-size:16px;font-weight:700;color:var(--wine);flex:1}
.drw-body{flex:1;overflow:auto;padding:14px 20px}
.task-card{border:1px solid var(--line);border-radius:10px;padding:11px 14px;margin-bottom:10px;font-size:13px}
.task-card .tt{font-weight:700;display:flex;align-items:center;gap:8px;justify-content:space-between}
.task-card .tm{color:var(--muted);font-size:12px;margin-top:2px;line-height:1.6}
.task-card .ta{margin-top:8px;display:flex;gap:8px;align-items:center}
.spin{display:inline-block;width:13px;height:13px;border:2px solid #D8CFC0;border-top-color:var(--gold);border-radius:99px;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* ============ 時間軸 ============ */
.tl{position:relative;padding-left:24px}
.tl::before{content:"";position:absolute;left:7px;top:6px;bottom:6px;width:2px;background:var(--line)}
.tl-item{position:relative;padding:0 0 16px 8px}
.tl-item:last-child{padding-bottom:2px}
.tl-item .dot{position:absolute;left:-24px;top:5px;width:16px;height:16px;border-radius:99px;background:#fff;border:3px solid #CFC6B8}
.tl-item.hot .dot{border-color:var(--wine);background:var(--wine);box-shadow:0 0 0 3px rgba(138,27,41,.15)}
.tl-item .t1{font-size:13.5px;font-weight:700;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tl-item .t1 .at{font-weight:400;color:var(--muted);font-size:12.5px;font-variant-numeric:tabular-nums}
.tl-item .t2{font-size:12.5px;color:var(--muted);margin-top:2px;line-height:1.6;word-break:break-all}
.tl-item .t2 b{color:#6B5E4E}

/* ============ 手風琴(FAQ/文章) ============ */
.acc{border:1px solid var(--line);border-radius:10px;margin-bottom:10px;background:#fff;overflow:hidden}
.acc-head{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;transition:.15s;user-select:none}
.acc-head:hover{background:#FDFBF5}
.acc-head .ar{flex:none;font-size:11px;color:var(--gold);transition:.2s}
.acc.open .acc-head .ar{transform:rotate(90deg)}
.acc-head .ttl{font-weight:700;font-size:14px;flex:1;min-width:0;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.acc-body{display:none;padding:4px 16px 16px;border-top:1px dashed var(--line)}
.acc.open .acc-body{display:block}

/* ============ 行事曆 ============ */
.cal{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;max-width:520px}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.cal-head .m{font-family:'Noto Serif TC',serif;font-size:17px;font-weight:900;color:var(--wine)}
.cal-nav{width:30px;height:30px;border-radius:99px;border:1px solid var(--line);font-size:13px;color:#6B6155;transition:.15s}
.cal-nav:hover{border-color:var(--gold);color:var(--wine)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-grid .wd{text-align:center;font-size:11.5px;color:var(--muted);font-weight:700;padding:3px 0}
.cal-d{aspect-ratio:1.15;border-radius:8px;border:1px solid transparent;font-size:13.5px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;transition:.12s;position:relative;font-variant-numeric:tabular-nums}
.cal-d:hover{border-color:var(--gold)}
.cal-d.out{opacity:.28;pointer-events:none}
.cal-d.hol{background:var(--err-bg);color:var(--err);font-weight:700}
.cal-d.hol .hn{font-size:9.5px;line-height:1.2;font-weight:500}
.cal-d.wknd{color:#B3A897}
.cal-d.today{border-color:var(--wine);font-weight:900}
.cal-pop{position:absolute;z-index:220;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow-lg);padding:12px;width:300px}
.cal-pop .cal-d.dis{opacity:.3;pointer-events:none;text-decoration:line-through}
.cal-pop .legend{font-size:11.5px;color:var(--muted);margin-top:8px;line-height:1.7;border-top:1px dashed var(--line);padding-top:7px}

/* ============ 通知面板 ============ */
.notif-wrap{position:relative}
.notif-pop{position:absolute;top:calc(100% + 8px);right:0;width:360px;max-width:86vw;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow-lg);z-index:150;overflow:hidden}
.notif-pop h4{font-size:13.5px;padding:11px 16px;border-bottom:1px solid var(--line);color:var(--wine)}
.notif-pop h4 small{font-weight:400;color:var(--muted);margin-left:6px}
.notif-list{max-height:330px;overflow:auto}
.ntf{padding:11px 16px;border-bottom:1px solid #F0EADD;font-size:13px;line-height:1.55;display:flex;gap:9px}
.ntf:last-child{border-bottom:none}
.ntf .ic{flex:none;width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px}
.ntf .tx b{display:block}
.ntf .tx .at{font-size:11.5px;color:var(--muted)}
.ntf.unread{background:#FDF9EF}

/* ============ 統計卡(儀表板) ============ */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:18px}
.stat{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid rgba(231,223,210,.7);padding:15px 18px;cursor:pointer;transition:.16s;position:relative;overflow:hidden}
.stat:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(78,12,22,.12)}
.stat::after{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--st,var(--gold))}
.stat .lb{font-size:12.5px;color:var(--muted);font-weight:700;letter-spacing:.5px}
.stat .v{font-family:'Noto Serif TC',serif;font-size:30px;font-weight:900;color:var(--ink);line-height:1.3}
.stat .v small{font-size:13px;color:var(--muted);font-family:'Noto Sans TC',sans-serif;font-weight:500;margin-left:3px}
.stat .go{font-size:11.5px;color:var(--gold);font-weight:700}

/* ============ 明細編輯行(代客下單/換開/折讓) ============ */
.line-tbl{width:100%;border-collapse:collapse;margin-bottom:8px}
.line-tbl th{font-size:12px;color:#6B6155;text-align:left;padding:5px 8px;border-bottom:1.5px solid var(--line);white-space:nowrap;font-weight:700}
.line-tbl td{padding:6px 8px 6px 0;vertical-align:top}
.line-tbl td:first-child{padding-left:8px}
.line-tbl .in{height:37px;font-size:13.5px}
.line-tbl .rm-line{color:#B7AD9E;font-size:15px;width:30px;height:30px;border-radius:99px;transition:.15s}
.line-tbl .rm-line:hover{color:var(--err);background:var(--err-bg)}
.stock-hint{font-size:11.5px;margin-top:3px;line-height:1.4}
.stock-hint.okv{color:var(--ok)}
.stock-hint.bad{color:var(--err);font-weight:700}
.amount-summary{background:#FBF8F1;border:1px solid var(--line);border-radius:10px;padding:12px 16px;margin-top:10px}
.amount-summary .row{display:flex;justify-content:space-between;padding:3.5px 0;font-size:13.5px}
.amount-summary .row .k2{color:#6B6155}
.amount-summary .row .v2{font-weight:700;font-variant-numeric:tabular-nums}
.amount-summary .row.total{border-top:1.5px dashed #D8CFC0;margin-top:6px;padding-top:9px}
.amount-summary .row.total .v2{font-family:'Noto Serif TC',serif;font-size:21px;color:var(--wine-bright)}
.amount-summary .row .neg{color:var(--ok)}
.amount-summary .row .pos{color:var(--wine-bright)}

/* ============ 區塊編輯器(Footer 文章) ============ */
.blk{border:1.5px solid var(--line);border-radius:10px;margin-bottom:10px;overflow:hidden}
.blk-bar{display:flex;align-items:center;gap:6px;background:#FBF8F1;border-bottom:1px solid var(--line);padding:5px 10px;font-size:12px;color:#6B6155}
.blk-bar .ty{font-weight:700;color:#7A5C1E;margin-right:auto}
.blk-bar button{width:26px;height:26px;border-radius:7px;transition:.13s;font-size:12.5px;color:#6B6155}
.blk-bar button:hover{background:var(--gold-pale);color:var(--wine)}
.blk-body{padding:10px 12px}
.blk-body textarea{width:100%;border:none;resize:vertical;min-height:74px;font-size:13.5px;line-height:1.7;outline:none}
.blk-img{background:linear-gradient(135deg,#7E1523,#4E0C16);border-radius:8px;aspect-ratio:16/6;display:flex;align-items:center;justify-content:center;color:#F3E2B9;font-family:'Noto Serif TC',serif;font-size:19px;font-weight:900;letter-spacing:3px}
.ed-tools{display:flex;gap:6px;margin-bottom:9px;flex-wrap:wrap}

/* ============ 示範控制台 ============ */
#demoFab{position:fixed;left:16px;bottom:16px;z-index:300;width:56px;height:56px;border-radius:99px;background:linear-gradient(135deg,#3A2E24,#241B16);color:var(--gold-l);font-size:13px;font-weight:700;letter-spacing:2px;box-shadow:0 6px 18px rgba(36,27,22,.45);border:1.5px solid #5A4C3E;transition:.18s}
#demoFab:hover{transform:scale(1.06)}
#demoPanel{position:fixed;left:16px;bottom:82px;z-index:300;width:308px;max-height:72vh;overflow:auto;background:#241B16;color:#E4D9C6;border-radius:14px;box-shadow:var(--shadow-lg);padding:16px;display:none;border:1px solid #4A3C2E}
#demoPanel.open{display:block}
#demoPanel h5{font-size:14px;color:var(--gold-l);letter-spacing:1px;margin-bottom:4px}
#demoPanel h5 small{color:#9C8B74;font-weight:400;margin-left:6px}
#demoPanel .grp{font-size:11px;color:#9C8B74;letter-spacing:2px;margin:12px 0 6px;border-bottom:1px solid #3A2E24;padding-bottom:3px}
.d-btn{display:block;width:100%;text-align:left;background:#33281F;border:1px solid #4A3C2E;color:#E4D9C6;border-radius:8px;padding:7px 11px;font-size:12.5px;margin-bottom:6px;transition:.14s;line-height:1.5}
.d-btn:hover{background:var(--gold);color:#241B16;border-color:var(--gold)}
.d-row{display:flex;gap:6px}
.d-row .d-btn{flex:1}

/* ============ 雜項 ============ */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}
@media (max-width:1080px){.grid2{grid-template-columns:1fr}}
.mini-tbl{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:6px}
.mini-tbl th{background:#FBF8F1;padding:6px 10px;text-align:left;font-size:11.5px;color:#6B6155;border-bottom:1px solid var(--line);white-space:nowrap}
.mini-tbl td{padding:6px 10px;border-bottom:1px solid #F0EADD;vertical-align:top}
.sched{display:flex;flex-direction:column;gap:9px}
.sched .si{display:flex;gap:12px;align-items:flex-start;font-size:13.5px}
.sched .si .tm{flex:none;font-variant-numeric:tabular-nums;font-weight:900;color:var(--wine);font-family:'Noto Serif TC',serif;width:52px}
.sched .si .ds small{display:block;color:var(--muted);font-size:12px}
.sortable-hint{cursor:help;border-bottom:1px dashed var(--muted)}
.hr-d{border:none;border-top:1px dashed var(--line);margin:14px 0}
.foldlink{color:var(--wine);font-size:13px;font-weight:700;cursor:pointer;user-select:none}
.foldlink .ar{display:inline-block;transition:.18s;font-size:11px}
.foldlink.open .ar{transform:rotate(90deg)}
.ip-chip{font-variant-numeric:tabular-nums;background:var(--gray-bg);border-radius:6px;padding:0 7px;font-size:12px;color:var(--gray)}

/* ============ RWD(後台以桌機為主,提供基本適配) ============ */
@media (max-width:1000px){
  .side{position:fixed;left:0;top:34px;bottom:0;height:auto;transform:translateX(-100%);transition:.22s;box-shadow:var(--shadow-lg)}
  .side.open{transform:none}
  .tb-burger{display:inline-flex;align-items:center;justify-content:center}
  .content{padding:16px 14px 60px}
  .tb-user .rl{display:none}
  .kv{grid-template-columns:118px 1fr}
}
</style>

<!-- ============ Prototype 頂條 ============ -->
<div class="proto-strip">
  <div class="pwrap">
    <span><b>PROTOTYPE</b> 王品集團紙本票券訂購網 管理後台 · 需求討論版 v1.0(2026-07-18)</span>
    <span class="sp"></span>
    <span style="opacity:.75">僅供內部會議討論,非正式畫面,資料皆為示意</span>

  </div>
</div>

<div id="app"></div>

<!-- 固定元素 -->
<div id="toasts"></div>
<div id="modalRoot"></div>
<div id="drawerRoot"></div>
<div id="calRoot"></div>
<button id="demoFab" data-action="toggle-demo" title="示範控制台">示範</button>
<div id="demoPanel">
  <h5>示範控制台 <small>會議用</small></h5>
  <div class="grp">登入身分(權限示範)</div>

    <button class="d-btn" data-action="demo-login" data-acc="fin.chang">財務部</button>
    <button class="d-btn" data-action="demo-login" data-acc="it.lin">資訊部</button>
  </div>
  <div class="d-row">
    <button class="d-btn" data-action="demo-login" data-acc="kevin.wang">票拓:kevin(覆核用)</button>
    <button class="d-btn" data-action="demo-logout">登出</button>
  </div>
  <div class="grp">情境模擬</div>

  <button class="d-btn" data-action="demo-inv-fail">模擬:汎宇發票開立失敗(§4)</button>
  <button class="d-btn" data-action="demo-cust-reply">模擬:顧客回覆退貨單 Email(§7.3)</button>

    <button class="d-btn" data-action="nav" data-to="#/orders">訂單</button>

  <button class="d-btn" data-action="demo-reset">重置 Demo 資料(重新整理)</button>
</div>
<script>
'use strict';
/* ================================================================
   王品集團紙本票券訂購網 管理後台 Prototype — 純前端示意,無後端
   ================================================================ */

/* ---------- 小工具 ---------- */
const $ = s => document.querySelector(s);
const $$ = s => [...document.querySelectorAll(s)];
const esc = s => String(s??'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fm = n => '$' + Math.round(n).toLocaleString('en-US');
const fmS = n => (n<0?'-$':'$') + Math.abs(Math.round(n)).toLocaleString('en-US');
const pad = n => String(n).padStart(2,'0');
const fmtD = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const fmtDT = d => `${fmtD(d)} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
const fmtDM = d => `${fmtD(d)} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
const addDays = (d,n) => { const x = new Date(d); x.setDate(x.getDate()+n); return x; };
const addMin = (d,n) => new Date(d.getTime()+n*60000);
const at = (offsetD,h=10,m=0,s=0) => { const x = addDays(new Date(),offsetD); x.setHours(h,m,s,0); return x; };
const dash = v => (v===undefined||v===null||v==='') ? '<span class="muted">-</span>' : esc(v);
const toHalf = s => (s||'').replace(/[！-～]/g, c => String.fromCharCode(c.charCodeAt(0)-0xFEE0)).replace(/　/g,' ');
function setPath(obj,path,val){ const ks = path.split('.'); let o = obj; for(let i=0;i<ks.length-1;i++) o = o[ks[i]]; o[ks[ks.length-1]] = val; }

function toast(msg,type='',ms=3600){
  const t = document.createElement('div');

/* ---------- 列表(§共同邏輯:預設 20 筆,可切 20/50/100) ---------- */
function listBox(listKey, rows, colsHTML, rowFn, opts={}){
  const per = state.per[listKey]||20;
  let pg = state.page[listKey]||1;
  const total = rows.length, pages = Math.max(1, Math.ceil(total/per));
  if(pg>pages) pg = pages;
  const slice = rows.slice((pg-1)*per, pg*per);
  let pgBtns = '';
  for(let i=1;i<=pages;i++){
    if(pages>7 && i>2 && i<pages-1 && Math.abs(i-pg)>1){ if(!pgBtns.endsWith('…')) pgBtns += '…'; continue; }
    pgBtns += `<button class="pg-btn ${i===pg?'on':''}" data-action="pg" data-list="${listKey}" data-p="${i}">${i}</button>`;
  }
  return `
  <div class="list-tools" data-req="共同邏輯-列表格式">
    <span class="total">共 <b>${total}</b> 筆${opts.note?` <span class="muted">${opts.note}</span>`:''}</span>
    <span class="sp"></span>${opts.tools||''}
    <select class="per-sel" data-action-ch="per" data-list="${listKey}">
      ${[20,50,100].map(n=>`<option value="${n}" ${per===n?'selected':''}>${n} 筆/頁</option>`).join('')}
    </select>
  </div>
  <div class="tbl-wrap"><table class="tbl">
    <thead><tr>${colsHTML}</tr></thead>
    <tbody>${slice.length ? slice.map(rowFn).join('') : `<tr><td colspan="99" class="empty">${opts.empty||'目前尚無符合條件的資料'}</td></tr>`}</tbody>
  </table></div>
  <div class="pager"><button class="pg-btn" data-action="pg" data-list="${listKey}" data-p="${Math.max(1,pg-1)}" ${pg===1?'disabled':''}>‹</button>${pgBtns}<button class="pg-btn" data-action="pg" data-list="${listKey}" data-p="${Math.min(pages,pg+1)}" ${pg===pages?'disabled':''}>›</button></div>`;
}

/* ---------- 匯出報表 + 任務佇列(§共同邏輯) ---------- */
function openExport(listKey, title, types, extraNote=''){
  const d1 = fmtD(addDays(new Date(),-30)), d2 = fmtD(new Date());
  openModal(dlgShell(`匯出報表 <span class="tag t-gold">${title}</span>`, `
    <div class="field"><label>報表類型 <span class="why">每一次只可以選擇一種報表匯出</span></label>
      <div class="radio-row">${types.map((t,i)=>`<label class="ck"><input type="radio" name="expType" value="${t.k}" ${i===0?'checked':''}><span><b>${t.label}</b><br><span class="muted" style="font-size:12px">${t.desc}</span></span></label>`).join('')}</div>
    </div>
    <div class="form-grid" style="margin-top:10px">
      <div class="field"><label>資料起日</label><input class="in" id="exp-d1" value="${d1}" placeholder="YYYY-MM-DD"></div>
      <div class="field"><label>資料迄日</label><input class="in" id="exp-d2" value="${d2}" placeholder="YYYY-MM-DD"></div>
    </div>
    <div class="fmsg bad" id="exp-msg"></div>
    <div class="note rule"><span class="ni">📌</span><span>每一次最多可以匯出 <b>6 個月</b>的資料,最久能匯出距離當下兩年前的資料。<br>詳情報表不包含異動紀錄、歷程記錄;所有報表的檔案格式固定為 Excel。${extraNote?'<br>'+extraNote:''}</span></div>
  `, `<button class="btn ghost" data-action="close-modal">取消</button><button class="btn pri" data-action="export-run" data-title="${title}">建立匯出任務</button>`));
}
function runExport(title){
  const d1 = $('#exp-d1').value.trim(), d2 = $('#exp-d2').value.trim(), msg = $('#exp-msg');
  const t1 = new Date(d1), t2 = new Date(d2);
  if(!d1 || !d2 || isNaN(t1) || isNaN(t2) || t1>t2){ msg.textContent='日期區間格式有誤,請輸入 YYYY-MM-DD 且起日不可晚於迄日'; msg.classList.add('show'); return; }
  if((t2-t1)/86400000 > 184){ msg.textContent='每一次最多可以匯出 6 個月的資料,請縮小日期區間'; msg.classList.add('show'); return; }
  if((new Date()-t1)/86400000 > 731){ msg.textContent='最久能匯出距離當下兩年前的資料,請調整起日'; msg.classList.add('show'); return; }
  const type = document.querySelector('input[name="expType"]:checked');
  const tname = title+'-'+(type?type.value:'簡易列表');
  const t = { id:'tk'+Math.random().toString(36).slice(2,8), owner:state.user.id, name:tname, cond:`${d1} ~ ${d2}`, at:new Date(), status:'處理中' };
  TASKS.unshift(t);
  closeModal();
  toast('已建立匯出任務,系統於背景執行中,完成後可至「任務佇列」下載','ok');
  rerender();
  setTimeout(()=>{ t.status='已完成'; toast(`匯出任務「${esc(tname)}」已完成 ✓ 請至任務佇列下載`,'ok'); if($('#taskDrw')) openTaskDrawer(); rerender(); }, 2600);
}
function openTaskDrawer(){

  $('#drawerRoot').innerHTML = `<div class="drw-ovl" data-action="task-close"></div>

          <div class="tm">條件:${esc(t.cond)}<br>建立:${fmtDT(t.at)} · ${esc(t.owner)}</div>

        </div>`).join('') : '<div class="tbl"><div class="empty" style="padding:40px 0;text-align:center;color:var(--muted)">目前沒有您的匯出任務</div></div>'}
    </div>
  </div>`;

function downloadTask(id){
  const t = TASKS.find(x=>x.id===id); if(!t) return;
  const csv = '﻿'+[`王品集團紙本票券訂購網 管理後台(Prototype 示意匯出)`,`報表:${t.name}`,`條件:${t.cond}`,`建立者:${t.owner}`,`建立時間:${fmtDT(t.at)}`,'','(正式版將依規格輸出 Excel 與完整欄位;詳情報表不包含異動紀錄、歷程記錄,敏感個資保持部分遮蔽)'].join('\n');
  const a = document.createElement('a');
  a.href = `data:text/csv;charset=utf-8,${encodeURIComponent(csv).replace(/'/g,'%27')}`;
  a.download = t.name.replace(/[\\/:*?"<>|]/g,'_')+'.csv';
  a.click();
  toast('報表已下載(Prototype 以 CSV 示意,正式版為 Excel)','ok');
}

/* ---------- 遮蔽解鎖(§2.2/§7:小眼睛,離開頁面需重新解鎖,需留解鎖紀錄) ---------- */
function eyeBtn(secKey, kind, no, label){
  const un = state.unlocked[secKey];
  return `<button class="eye-btn ${un?'unlocked':''}" data-action="unlock" data-sec="${secKey}" data-kind="${kind}" data-no="${no}" data-fl="${label}">${un?'👁 已解鎖(完整顯示中)':'👁‍🗨 解鎖檢視完整資料'}</button>`;
}
function doUnlock(sec, kind, no, label){
  if(state.unlocked[sec]){ state.unlocked[sec] = false; rerender(); return; }
  state.unlocked[sec] = true;
  const rec = { at:new Date(), by:state.user.id, fl:label };
  const doc = kind==='ra' ? RA(no) : kind==='rt' ? RT(no) : kind==='cust' ? CUST(no) : null;
  if(doc){ doc.unlockLog = doc.unlockLog||[]; doc.unlockLog.unshift(rec); }
  toast(`已解鎖【${label}】,解鎖紀錄已留存(離開頁面後需重新解鎖)`,'ok');
  rerender();
}
const unlockLogHTML = doc => (doc.unlockLog&&doc.unlockLog.length) ? `<div class="unlock-log"><b>解鎖紀錄</b><br>${doc.unlockLog.map(r=>`${fmtDT(r.at)}|${esc(r.by)}|檢視完整 ${esc(r.fl)}`).join('<br>')}</div>` : '';

function tlHTML(items, dirKey){
  const dir = state.sort[dirKey]||'asc';
  const arr = dir==='asc' ? items : [...items].reverse();
  return `<div class="tl">${arr.map((it,i)=>`
    <div class="tl-item ${(dir==='asc'? i===arr.length-1 : i===0)?'hot':''}">
      <span class="dot"></span>
      <div class="t1">${it.st?bdg(it.st):''}${it.field?`<b>${esc(it.field)}</b>`:''}<span class="at">${fmtDT(it.at)}</span>${it.by?`<span class="muted" style="font-size:12px">${esc(it.by)}</span>`:''}</div>
      ${it.note||it.before!==undefined?`<div class="t2">${it.before!==undefined&&it.after!==undefined?`異動前:<b>${esc(it.before)}</b> → 異動後:<b>${esc(it.after)}</b><br>`:''}${it.note?esc(it.note):''}</div>`:''}
    </div>`).join('')}</div>`;
}
const sortBtn = key => `<button class="btn xs ghost" data-action="sort-toggle" data-key="${key}">${(state.sort[key]||'asc')==='asc'?'由舊到新 ▲':'由新到舊 ▼'}(切換排序)</button>`;

      <div class="demo-note"><b>會議示範提示:</b>Demo 帳密已預填(密碼一律 Demo1234),直接點登入即可。<br>輸入錯誤密碼可展示「錯誤 4 次警告 / 5 次鎖定 15 分鐘 / 鎖定 2 次永久封鎖」情境;或用左下「示範控制台」一鍵模擬。<br>可切換帳號:sharon.tsai(票拓)/ fin.chang(財務)/ it.lin(資訊)體驗權限差異。</div>
      <div class="login-foot">忘記密碼或帳號遭鎖定,請提交資訊需求申請單(SBPM)向資訊部申請重設<br>© Wowprime Corp. 內部系統,禁止外流</div>
    </div>
  </div>`;
  if(locked) showLockMsg();
}
function showLockMsg(){
  const m = $('#lg-msg'); if(!m) return;
  m.classList.add('show');
  if(state.permaLock){ m.textContent = '已達錯誤嘗試上限,請向資訊部提交需求單解鎖'; return; }
  const t = state.lockUntil;
  m.textContent = `帳號已被鎖定,請於 ${pad(t.getHours())}:${pad(t.getMinutes())} 後再嘗試;或是向資訊部申請重設密碼`;
}
function doLogin(){
  const id = toHalf($('#lg-id').value.trim()), pw = $('#lg-pw').value, m = $('#lg-msg');
  m.classList.remove('show');
  if(state.permaLock){ m.classList.add('show'); m.textContent='已達錯誤嘗試上限,請向資訊部提交需求單解鎖'; return; }
  if(state.lockUntil && new Date() < state.lockUntil){ showLockMsg(); LOGIN_LOG.unshift({at:new Date(), id, ip:'10.8.20.31', ok:false, note:'鎖定期間嘗試登入'}); return; }
  const acc = ACCOUNTS.find(a=>a.id===id);
  if(acc && pw==='Demo1234' && acc.status==='正常'){
    LOGIN_LOG.unshift({at:new Date(), id, ip:'10.8.20.31', ok:true});
    resetDrafts();
    state.user = acc; state.loginFail = 0; state.lockUntil = null;
    toast(`歡迎回來,${acc.name}(${acc.group})`,'ok');
    nav('#/home'); return;
  }
  if(acc && acc.status==='鎖定中'){ m.classList.add('show'); m.textContent=`帳號已被鎖定,請於 ${pad(acc.lockUntil.getHours())}:${pad(acc.lockUntil.getMinutes())} 後再嘗試;或是向資訊部申請重設密碼`; return; }
  if(acc && acc.status==='永久封鎖'){ m.classList.add('show'); m.textContent='已達錯誤嘗試上限,請向資訊部提交需求單解鎖'; return; }
  state.loginFail++;
  LOGIN_LOG.unshift({at:new Date(), id, ip:'10.8.20.31', ok:false, note:`密碼錯誤(第 ${state.loginFail} 次)`});
  m.classList.add('show');
  if(state.loginFail===4){ m.textContent = '已輸入錯誤 4 次,再錯誤 1 次帳號將被鎖定 15 分鐘'; }
  else if(state.loginFail>=5){
    state.lockCnt++;
    if(state.lockCnt>=2){ state.permaLock = true; m.textContent = '已達錯誤嘗試上限,請向資訊部提交需求單解鎖'; toast('帳號已被鎖定 2 次 → 永久封鎖,需透過 SBPM 向資訊部申請解鎖','err',5000); }
    else{ state.lockUntil = addMin(new Date(),15); state.loginFail = 0; showLockMsg(); }
  }
  else{ m.textContent = `帳號或密碼錯誤(第 ${state.loginFail} 次)`; }
}

      </div>
    </div>`, `財務 / <a href="#/invoices">發票管理</a> / <b>${i.no||'待開立'}</b>`);
}
function invRetry(iid){
  const i = INV(iid); if(!i) return;
  i.status = '已開立'; i.issuedAt = new Date(); i.no = 'KA'+String(31002500+Math.floor(Math.random()*400));
  i.err = null;
  i.history.push({st:'已開立', at:new Date(), by:'SYSTEM', note:'自動重試成功(示範)'});
  const o = ORD(i.orderNo); if(o) o.invStatus = '已開立';
  toast('汎宇重試開立成功,發票號碼 '+i.no,'ok'); rerender();
}

<script>
/* ================================================================

const REISSUE_REASONS = ['統編更改','發票類型更改','買受人名稱更改','指定發票日期','其他'];
function origInvKV(i){

function renderReissue(iid){

    state.reissue = { iid, reason:'', reasonOther:'', src:'系統', type:i.type, no:'', date:'', buyer:i.buyer, taxid:i.taxid, carrier:i.carrier, mode:'票券',
      lines: i.items.map(x=>({name:x.name, qty:x.qty, amt:x.amt})) };

  const sum = r.mode==='餐費' ? Number(r.feeAmt||0) : r.lines.reduce((s,l)=>s+Number(l.amt||0),0);
  const mismatch = sum !== i.total;
  renderApp(`
    ${pageHead(`發票換開 <span class="mono" style="font-size:15px">${esc(i.no)}</span>`, '使用情境:顧客填錯統編、更換發票類型(三聯/二聯);客服僅能調整部分欄位且不能異動金額,故換開後不需要覆核;需有歷程記錄處理人員、時間', '', `#/invoice/${iid}`)}
    <div class="grid2" data-req="4.1 換開">

      </div>

            <input class="in" data-rr="no" value="${esc(r.no)}" ${r.src==='系統'?'disabled placeholder="系統自動配號"':'placeholder="人工開立之發票號碼"'}>

          <div class="field"><label>買方</label><input class="in" data-rr="buyer" value="${esc(r.buyer)}"></div>

        </div>

function riSave(){

    <div class="note warn"><span class="ni">⚠️</span><span><b>請再次確認內容無誤,送出後即時生效,不可再次編輯</b></span></div>

function alSave(){
  const a = state.allowDraft, i = INV(a.iid);
  const items = [...a.picks.filter(p=>p.on).map(p=>({name:p.name, qty:Number(p.qty)||0, amt:Number(p.amt)||0})), ...a.custom.filter(c=>c.name&&Number(c.amt)>0).map(c=>({name:c.name, qty:Number(c.qty)||0, amt:Number(c.amt)||0}))];
  const bad = a.picks.some(p=>p.on && (Number(p.qty)>p.maxQty || Number(p.amt)>p.maxAmt));
  if(bad){ toast('折讓數量/金額不可大於原購買數量與原發票金額','err'); return; }
  if(!items.length){ toast('請至少選取或填寫一項折讓內容','err'); return; }
  const sub = items.reduce((s,x)=>s+x.amt,0);
  const allowed = i.allow.reduce((s,x)=>s+x.sub,0);
  const after = i.total - allowed - sub;
  if(after<0){ toast('折讓金額超過原始發票總金額,請重新輸入','err'); return; }
  openModal(dlgShell('確認折讓', `
    <div class="note warn"><span class="ni">⚠️</span><span><b>請再次確認內容無誤,送出後即時生效,不可再次編輯</b></span></div>
    <div class="confirm-box">
      <div class="row"><span class="ck2">發票號碼</span><span class="cv mono">${esc(i.no)}</span></div>
      <div class="row"><span class="ck2">折讓內容</span><span class="cv">${items.map(x=>`${esc(x.name)} ×${x.qty}(${fm(x.amt)})`).join('、')}</span></div>
      <div class="row"><span class="ck2">折讓小計</span><span class="cv">${fm(sub)}</span></div>
      <div class="row"><span class="ck2">折讓後發票金額</span><span class="cv">${fm(after)}</span></div>
      <div class="row"><span class="ck2">送出後發票狀態</span><span class="cv">${after===0?'全額折讓':'部分折讓'}</span></div>
    </div>
  `, `<button class="btn ghost" data-action="close-modal">返回修改</button><button class="btn pri" data-action="al-commit">確認送出</button>`));
}
function alCommit(){
  const a = state.allowDraft, i = INV(a.iid);
  const items = [...a.picks.filter(p=>p.on).map(p=>({name:p.name, qty:Number(p.qty)||0, amt:Number(p.amt)||0})), ...a.custom.filter(c=>c.name&&Number(c.amt)>0).map(c=>({name:c.name, qty:Number(c.qty)||0, amt:Number(c.amt)||0}))];
  const sub = items.reduce((s,x)=>s+x.amt,0);
  const allowed = i.allow.reduce((s,x)=>s+x.sub,0);
  const after = i.total - allowed - sub;
  const now = new Date();
  const no = 'CR'+ymd(now)+String(101+i.allow.length).slice(-3);
  i.allow.push({ no, reason:a.reason||'(未填寫)', items, sub, date:now, by:state.user.id });
  i.status = after===0 ? '全額折讓' : '部分折讓';
  i.history.push({st:i.status, at:now, by:state.user.id, note:'折讓證明單 '+no+'(折讓 '+fm(sub)+')'+(after===0?';發票金額=折讓金額,不可再折讓':'')});
  const o = ORD(i.orderNo);
  if(o){ o.invStatus = i.status; o.changes.push({at:now, by:state.user.id, field:'發票折讓', before:i.no, after:'折讓單 '+no+'(折讓 '+fm(sub)+')'}); }
  state.allowDraft = null;
  closeModal(); toast(`折讓完成:${no},發票狀態轉為【${i.status}】`,'ok',4200);
  nav('#/invoice/'+i.iid);
}

function oLockToggle(no){
  const o = ORD(no); if(!o) return;
  o.locked = !o.locked;
  o.changes.push({at:new Date(), by:state.user.id, field:'訂單鎖定', before:o.locked?'解鎖':'鎖定中', after:o.locked?'鎖定中':'已解鎖(顧客可於前台編輯收件人姓名、收件地址、聯絡電話、手機號碼)'});
  toast(o.locked?'訂單已鎖定':'訂單已解鎖,顧客現在可於前台自行修改收件資訊','ok');
  rerender();
}
function oEdit(no){
  const o = ORD(no);
  const inv = INVOICES.find(i=>i.orderNo===no && i.status==='待開立');
  openModal(dlgShell('編輯訂單', `
    <div class="field" style="margin-bottom:12px"><label>付款期限 <span class="why">不會連動銀行,只是讓該訂單在後台不會被轉為已取消</span></label>
      <input class="in" id="oe-deadline" value="${o.payDeadline?fmtDT(o.payDeadline):''}" placeholder="YYYY-MM-DD hh:mm:ss"></div>
    <div class="field"><label>發票號碼(尚未填寫時可回填) ${inv?'':'<span class="why">本單發票非待開立狀態,不可回填</span>'}</label>
      <input class="in" id="oe-invno" value="" ${inv?'placeholder="填寫財務手開之發票號碼,如 KA31009xxx"':'disabled placeholder="—"'}>
      <div class="help">填寫後,需同步更新發票管理中對應訂單編號的發票號碼;若需要換開發票,需至發票管理中執行</div></div>
  `, `<button class="btn ghost" data-action="close-modal">取消</button><button class="btn pri" data-action="o-edit-save" data-no="${no}">儲存</button>`));
}
function oEditSave(no){
  const o = ORD(no);
  const dl = $('#oe-deadline').value.trim(), invno = toHalf($('#oe-invno').value.trim());
  if(dl){
    const nd = new Date(dl.replace(/-/g,'/'));
    if(isNaN(nd)){ toast('付款期限格式有誤,請輸入 YYYY-MM-DD hh:mm:ss','err'); return; }
    if(!o.payDeadline || nd.getTime()!==o.payDeadline.getTime()){
      o.changes.push({at:new Date(), by:state.user.id, field:'付款期限', before:o.payDeadline?fmtDT(o.payDeadline):'-', after:fmtDT(nd)});
      o.payDeadline = nd;
    }
  }
  if(invno){
    const inv = INVOICES.find(i=>i.orderNo===no && i.status==='待開立');
    if(inv){
      inv.no = invno; inv.status = '已開立'; inv.issuedAt = new Date();
      inv.history.push({st:'已開立', at:new Date(), by:state.user.id, note:'於訂單詳情回填人工發票號碼(同步更新發票管理)'});
      o.invStatus = '已開立';
      o.changes.push({at:new Date(), by:state.user.id, field:'發票號碼', before:'-', after:invno+'(人工回填)'});
    }
  }
  closeModal(); toast('已儲存;異動紀錄已留存','ok'); rerender();
}
function oCancel(no){
  openModal(dlgShell('取消訂單', `
    <p style="font-size:14px">確定取消訂單 <b class="mono">${no}</b>?</p>
    <div class="field" style="margin-top:10px"><label>取消原因</label>
      <select class="in" id="oc-reason"><option>票券沒問題但配送三次仍簽收失敗</option><option>顧客要求取消</option><option>付款逾期(人工)</option><option>其他</option></select></div>
    <div class="note info"><span class="ni">ℹ️</span><span>取消後:釋放預留庫存、停止自動對帳、票券入庫(保全倉)、已開立之發票將作廢。</span></div>
  `, `<button class="btn ghost" data-action="close-modal">返回</button><button class="btn warn-solid" data-action="o-cancel-commit" data-no="${no}">確認取消訂單</button>`));
}
function oCancelCommit(no){
  const o = ORD(no); if(!o) return;
  const reason = $('#oc-reason').value;
  o.status = '已取消';
  o.history.push({st:'已取消', at:new Date(), note:'客服取消('+reason+');需紀錄是付款逾期取消或顧客手動取消'});
  const inv = INVOICES.find(i=>i.orderNo===no && ['已開立','部分折讓'].includes(i.status));
  if(inv){ inv.status = '已作廢'; inv.history.push({st:'已作廢', at:new Date(), by:'SYSTEM', note:'訂單取消,發票作廢'}); o.invStatus = '已作廢'; }
  closeModal(); toast('訂單已取消','ok'); rerender();
}
function oPaid(no){
  openModal(dlgShell('人工回壓已付款', `
    <p style="font-size:14px;line-height:1.8">確認將訂單 <b class="mono">${no}</b> 的付款狀態回壓為<b>【已付款】</b>?</p>
    <div class="note rule"><span class="ni">📌</span><span>適用:先出貨+開發票、後付款(預支/應收),或分次匯款人工對帳完成。客服需先於備註記錄匯款日期、金額、帳號後 5 碼。</span></div>
  `, `<button class="btn ghost" data-action="close-modal">取消</button><button class="btn ok-solid" data-action="o-paid-commit" data-no="${no}">確認回壓</button>`));
}
function oPaidCommit(no){
  const o = ORD(no); if(!o) return;
  o.payStatus = '已付款';
  o.changes.push({at:new Date(), by:state.user.id, field:'付款狀態', before:'待付款', after:'已付款(人工回壓)'});
  if(o.status==='待付款'){
    o.status = '待配送'; o.shipNo = o.shipNo||('DN'+ymd(new Date())+'0'+String(300+Math.floor(Math.random()*90)));
    o.history.push({st:'待配送', at:new Date(), note:'人工回壓已付款,自動產出出貨單 '+o.shipNo});
    if(!INVOICES.some(i=>i.orderNo===no)){
      o.invStatus = '已開立';
      const inv = { iid:'IV'+(INVOICES.length+20), no:'KA'+String(31004000+Math.floor(Math.random()*900)), orderNo:no, src:'系統', type:o.orderInfo&&o.orderInfo.ident==='company'?'三聯式':'二聯式', buyer:o.orderInfo?(o.orderInfo.comp||o.orderInfo.name):'', taxid:o.orderInfo?o.orderInfo.taxid||'':'', carrier:'',
        itemMode:o.premium?'禮券一批':'票券', items:o.premium?[{name:'禮券一批',qty:1,amt:o.total+o.premium}]:o.lines.map(l=>({name:P(l.id).name, qty:l.qty, amt:l.price*l.qty})), total:o.total+o.premium, issuedAt:new Date(), apptDate:null, status:'已開立', allow:[],
        history:[{st:'已開立', at:new Date(), by:'SYSTEM', note:'付款狀態轉已付款,系統自動開立'}] };
      INVOICES.push(inv);
    }
  }
  closeModal(); toast('付款狀態已回壓為已付款'+(o.status==='待配送'?';訂單轉待配送,發票由系統開立(LINE OA 已推播「訂單已成立」— 模擬)':''),'ok',4500); rerender();
}
function oReviewOk(no){
  const o = ORD(no); if(!o||!o.review) return;
  o.review.reviewer = state.user.id; o.review.reviewedAt = new Date();
  o.status = '待配送'; o.payStatus = '已付款';
  o.shipNo = 'DN'+ymd(new Date())+'0'+String(310+Math.floor(Math.random()*80));
  o.history.push({st:'待配送', at:new Date(), note:'覆核通過(覆核人:'+state.user.id+'),人工回壓已付款,自動在有價券系統產出出貨單 '+o.shipNo});
  o.changes.push({at:new Date(), by:state.user.id, field:'覆核', before:'申請中', after:'覆核通過'});
  const iv = INVOICES.find(i=>i.orderNo===no);
  if(!iv){ o.invStatus = '待開立'; INVOICES.push({ iid:'IVR'+Math.random().toString(36).slice(2,6), no:'', orderNo:no, src:'人工', type:'三聯式', buyer:o.orderInfo?(o.orderInfo.comp||o.orderInfo.name):'', taxid:o.orderInfo?o.orderInfo.taxid:'', carrier:'', itemMode:o.premium?'禮券一批':'票券', items:o.premium?[{name:'禮券一批',qty:1,amt:o.total+o.premium}]:o.lines.map(l=>({name:P(l.id).name,qty:l.qty,amt:l.price*l.qty})), total:o.total+o.premium, issuedAt:null, apptDate:null, status:'待開立', allow:[], history:[{st:'待開立', at:new Date(), by:state.user.id, note:'覆核通過,待財務手開發票後於訂單回填號碼'}] }); }
  toast('覆核通過:訂單轉【待配送】,已自動產出出貨單 '+o.shipNo,'ok',4500);
  rerender();
}
function oReviewNo(no){
  openModal(dlgShell('覆核駁回', `
    <div class="field"><label><span class="req">*</span>駁回原因</label><textarea class="in" id="rv-reason" placeholder="必填,將以 email 通知訂單建立者"></textarea></div>
  `, `<button class="btn ghost" data-action="close-modal">取消</button><button class="btn warn-solid" data-action="o-review-no-commit" data-no="${no}">確認駁回</button>`));
}
function oReviewNoCommit(no){
  const o = ORD(no); const reason = $('#rv-reason').value.trim();
  if(!reason){ toast('請填寫駁回原因','err'); return; }
  o.review.reviewer = state.user.id; o.review.reviewedAt = new Date(); o.review.rejected = true; o.review.reason = reason;
  o.status = '已駁回';
  o.history.push({st:'已駁回', at:new Date(), note:'覆核駁回('+state.user.id+'):'+reason+';已 email 通知訂單建立者'});
  closeModal();
  mailToast('【王品下單網後台】代客下單 '+no+' 覆核駁回通知', '收件者:'+o.review.applicant+'@wowprime.com;原因:'+esc(reason));
  rerender();
}
function oResubmit(no){
  const o = ORD(no); if(!o) return;
  o.status = '申請中'; o.review = { applicant:state.user.id, at:new Date() };
  o.history.push({st:'申請中', at:new Date(), note:'修改後重新送出覆核申請'});
  mailToast('【王品下單網後台】代客下單 '+no+' 待覆核', '通知角色為票拓的帳號');
  rerender();
}

<script>

   View:代客下單(§6.3 僅票拓/票拓主管可建立;無訂單低消和購買數量限制)

const PAY_MAP = {
  '預支':['內部沖銷'], '應收':['分次匯款'], '換貨':['信用卡','虛擬帳號匯款','分次匯款'], '一般':['信用卡','虛擬帳號匯款','分次匯款'], 'POS 代收':['POS 代收'],
};
function initOC(){
  return { cust:'', wh:'總部倉',
    oi:{ident:'company', comp:'', taxid:'', dept:'', title:'', name:'', tel:'', mobile:'', email:''},
    si:{name:'', tel:'', mobile:'', city:'', dist:'', addr:'', agentOk:false, apptDate:''},
    lines:[{pid:'', qty:''}],
    payKind:'預支', payMethod:'內部沖銷', retNo:'', retAmt:0, premium:'',
    invSrc:'系統', invType:'三聯式', invNo:'', invMode:'票券', remark:'' };
}
function ocFillFromCust(code){
  const c = CUST(code); const oc = state.oc;
  if(!c) return;
  const d = c.company||c.personal||{};
  oc.oi = { ident:c.company?'company':'personal', comp:d.comp||'', taxid:d.taxid||'', dept:d.dept||'', title:d.title||'', name:d.name||'', tel:(d.tel||[]).filter(Boolean).join('-'), mobile:d.mobile||'', email:c.email };
  oc.si = Object.assign(oc.si, { name:d.name||'', mobile:d.mobile||'' });
  oc.invType = c.company?'三聯式':'二聯式';
}
function ocCalc(){
  const oc = state.oc;
  const total = oc.lines.reduce((s,l)=>{ const p = P(l.pid); return s + (p ? p.price*(Number(l.qty)||0) : 0); },0);
  const premium = Number(toHalf(String(oc.premium||'')))||0;
  const retAmt = oc.payKind==='換貨' ? (Number(oc.retAmt)||0) : 0;
  return { total, premium, retAmt, actual: total - retAmt + premium, invTotal: total + premium };
}

              ${oc.payKind==='換貨'?'<div class="help">換貨情境:預設顧客已收到退貨折讓單,新訂單發票使用訂單總金額而非顧客實付金額</div>':''}</div>

              <td><input class="in" value="${p?fm(p.price):''}" disabled placeholder="—"></td>

          <textarea class="in" data-oc="remark" placeholder="例:分次匯款 — 7/20 $50,000 帳號後5碼 12345;7/27 $98,000 帳號後5碼 12345">${esc(oc.remark)}</textarea>
        </div>
        <div style="display:flex;justify-content:flex-end;gap:9px">
          <button class="btn ghost" data-action="oc-reset">清空重填</button>
          <button class="btn pri" style="padding:12px 34px;font-size:15px" data-action="oc-submit">建立訂單</button>

      </div>
    </div>`, `營運管理 / <a href="#/orders">訂單管理</a> / <b>代客下單</b>`);
}
function ocSubmit(){
  const oc = state.oc, c = ocCalc();
  if(!oc.cust){ toast('請先選擇客戶編碼;若無客戶編碼,需先至顧客資料管理建立後,才可建立訂單','err',4600); return; }
  const lines = oc.lines.filter(l=>l.pid);
  if(!lines.length){ toast('請至少選擇一項票券','err'); return; }
  for(const l of lines){
    if(!vPosInt(l.qty)){ toast(`【${P(l.pid).name}】訂購數量僅可輸入正整數`,'err'); return; }
    const avail = P(l.pid).stock[oc.wh];
    if(Number(l.qty) > avail){ toast(`目前庫存不足,可銷售庫存為 ${avail.toLocaleString()},請再次確認後重新送出`,'err',4600); return; }
  }
  if(oc.oi.ident==='company' && !vTaxId(toHalf(oc.oi.taxid))){ toast('統一編號格式不符,請重新輸入','err'); return; }
  if(!vMobile(toHalf(oc.oi.mobile))){ toast('訂購人手機號碼格式不符,請重新輸入','err'); return; }
  if(!oc.oi.name){ toast('請填寫聯絡人姓名','err'); return; }
  if(oc.payKind==='換貨'){
    const rt = RT(toHalf(oc.retNo.trim()));
    if(!rt){ toast('查無此退貨單編號,請確認後重新輸入','err'); return; }
  }
  const kindNote = ['預支','應收'].includes(oc.payKind)
    ? '送出後狀態為【申請中】,需另一位票拓覆核(建單人不可等於覆核人),將 email 通知角色為票拓的帳號'
    : c.actual>0 ? '實付金額 > 0:訂單【待付款】,將 email 提供顧客訂單查詢連結與付款連結'
    : c.actual===0 ? '實付金額 = 0:免金流,訂單直接轉【待配送】'
    : '實付金額 < 0:訂單轉【待配送】,需回原退貨單執行退款流程';
  openModal(dlgShell('確認建立訂單', `
    <div class="confirm-box">
      <div class="row"><span class="ck2">客戶編碼</span><span class="cv mono">${esc(oc.cust)}</span></div>
      <div class="row"><span class="ck2">出貨倉別</span><span class="cv">${esc(oc.wh)}</span></div>

    </div>
    <div class="note info"><span class="ni">ℹ️</span><span>${kindNote}</span></div>
  `, `<button class="btn ghost" data-action="close-modal">返回修改</button><button class="btn pri" data-action="oc-commit">確認建立</button>`,'w-lg'));
}
function ocCommit(){
  const oc = state.oc, c = ocCalc();
  const lines = oc.lines.filter(l=>l.pid);
  const now = new Date();
  const no = genOrdNo(now);
  const cust = CUST(oc.cust);
  const isReview = ['預支','應收'].includes(oc.payKind);
  const isPos = oc.payKind==='POS 代收';
  const status = isReview ? '申請中' : isPos ? '已完成' : (c.actual>0 ? '待付款' : '待配送');
  const o = mkOrder({ no, created:now, src:'後台', custCode:oc.cust, buyer:oc.oi.name, recv:oc.si.name||oc.oi.name,
    payKind:oc.payKind, payMethod:oc.payMethod, status, payStatus:isReview?'-':(isPos?'已付款':(c.actual>0?'待付款':'已付款')), invStatus: isReview?'-':(isPos?'-':(oc.invSrc==='人工'?'待開立':(c.actual>0?'-':'已開立'))),
    shipNo: (!isReview && (isPos || c.actual<=0)) ? 'DN'+ymd(now)+'0'+String(320+Math.floor(Math.random()*70)) : null,
    shipWh:oc.wh, locked:false, payDeadline: (c.actual>0 && !isPos) ? addDays(now, oc.payMethod==='分次匯款'?3:1) : null, payAcct:null, payLink:c.actual>0 && !isPos,
    lines: lines.map(l=>[l.pid, Number(l.qty)]),
    retNo: oc.payKind==='換貨'?toHalf(oc.retNo.trim()):null, retAmt:c.retAmt, premium:c.premium,
    orderInfo:{ident:oc.oi.ident, comp:oc.oi.comp, taxid:toHalf(oc.oi.taxid), dept:oc.oi.dept, title:oc.oi.title, name:oc.oi.name, tel:oc.oi.tel, mobile:toHalf(oc.oi.mobile), email:oc.oi.email},
    shipInfo:{name:oc.si.name||oc.oi.name, tel:oc.si.tel, mobile:toHalf(oc.si.mobile||oc.oi.mobile), city:oc.si.city||'-', dist:oc.si.dist||'', addr:oc.si.addr||'-', agentOk:oc.si.agentOk, apptDate:null},
    history:[{st:isReview?'申請中':status, at:now, note:isReview?'代客下單('+oc.payKind+'),送出覆核申請':'代客下單('+oc.payKind+')'}],
    review: isReview ? {applicant:state.user.id, at:now} : null,
    createdBy:state.user.id, remark:oc.remark });
  o.actual = c.actual;
  ORDERS.unshift(o);
  if(oc.payKind==='換貨' && o.retNo){
    const rt = RT(o.retNo);
    if(rt){ rt.newOrderNo = no; rt.changes.push({t:'內容變更', at:now, by:state.user.id, field:'新訂單編號', before:'-', after:no+'(系統自動回填)'}); }
  }
  lines.forEach(l=>{ P(l.pid).stock[oc.wh] -= Number(l.qty); });
  closeModal();
  if(isReview){
    mailToast('【王品下單網後台】代客下單 '+no+' 待覆核', '通知角色為票拓的帳號(建單人:'+state.user.id+')');
  } else if(isPos){
    toast('POS 代收訂單與出貨單已直接掛上終態(僅作紀錄,不需人為操作)','ok',4200);
  } else if(c.actual>0){
    mailToast('【王品集團紙本票券訂購網】訂單付款提醒', '收件者:'+esc(oc.oi.email)+';內含訂單查詢連結與付款連結,期限 '+fmtDT(o.payDeadline));
  } else if(c.actual<0){
    toast('實付金額為負,請回到原退貨單 <a href="#/return-note/'+o.retNo+'">'+o.retNo+'</a> 執行退款流程','',5200);
  }
  toast('訂單 '+no+' 已建立('+status+')','ok',4500);
  state.oc = null;
  nav('#/order/'+no);
}

function bankKV(r, secKey){
  const un = state.unlocked[secKey];

  return kv([
    ['銀行代碼/名稱', esc(b.code+' '+b.name)],
    ['分行代碼/名稱', esc(b.branch)],
    ['戶名', un?esc(b.holder):`<span class="mask-val">${esc(mHolder(b.holder))}</span>`],
    ['帳號', un?`<span class="mono">${esc(b.acct)}</span>`:`<span class="mono mask-val">${esc(mAcct(b.acct))}</span>`],
    ['存摺封面', b.book?`<button class="btn xs ghost" data-action="fake-photo" data-t="存摺封面(含滿版傾斜浮水印:僅供王品集團紙本票券退款使用,塗改翻印無效)">🖼 檢視照片(不可編輯)</button>`:''],
  ]);

function contactKV(r, secKey, hideRecv){
  const un = state.unlocked[secKey];
  const m = (v,fn)=> un?esc(v||''):`<span class="mask-val">${esc(fn(v||''))}</span>`;
  const rc = r.recv, ct = r.contact;
  if(!rc && !ct) return '<div class="muted" style="padding:8px 0">-(POS 門市交易,無收件與聯絡資訊)</div>';
  return kv([
    ['收件人姓名*', hideRecv?'':m(rc.name,mName)],
    ['收件地址*', hideRecv?'':(un?esc(rc.city+rc.dist+rc.addr):`<span class="mask-val">${esc(mAddr(rc.city,rc.dist))}</span>`)],
    ['聯絡電話(分機)', hideRecv?'':(rc.tel?esc(rc.tel):'')],
    ['手機號碼*', hideRecv?'':m(rc.mobile,mMobile)],
    ['聯絡人姓名', ct?m(ct.name,mName):''],
    ['聯絡電話(分機)', ct&&ct.tel?esc(ct.tel):''],
    ['手機號碼', ct?m(ct.mobile,mMobile):''],
    ['電子信箱*', ct?(un?esc(ct.email):`<span class="mask-val">${esc(mEmail(ct.email))}</span>`):''],
  ]);
}

      </div>
    </div>`, `營運管理 / <a href="#/returns">退貨管理</a> / <b>${r.no}</b>`);
}
function raPass(no){
  const r = RA(no); if(!r) return;
  r.status = '待收件'; r.dueDate = addDays(new Date(),21);
  r.changes.push({at:new Date(), by:state.user.id, before:'待初審', after:'待收件', note:'初審通過'});
  mailToast('【王品集團紙本票券訂購網】退換貨申請已受理,請寄回票券', '提醒顧客於 7 個日曆天內以掛號寄回票券(後台放寬 21 天判定逾期)');
  rerender();
}
function raWait(no){

function raAccept(no){

  const fee = feeRule.mode==='百分比' ? Math.round(r.total*feeRule.val/100) : feeRule.val;
  const reissueFee = r.way==='換貨' ? (reisRule.mode==='百分比'?Math.round(r.total*reisRule.val/100):reisRule.val) : 0;
  const rt = mkRT({ no:newNo, appNo:r.no, orderNo:r.orderNo, newOrderNo:null, email:r.email, status:'草稿', createdAt:now,
    scope:r.scope, nos:[...r.nos], qty:r.qty, reason:r.reason, photos:r.photos, way:r.way, refundTo:r.refundTo,
    exchange: r.way==='換貨' ? {wh:'總部倉', lines:[{id:'', qty:''}]} : null,

  RETURN_NOTES.unshift(rt);

  r.changes.push({at:now, by:state.user.id, before:'驗收中', after:'已受理', note:'受理建單,退貨單編號 '+newNo+'(系統自動將申請表單轉為已完成——狀態名稱以會議確認為準,GAP-03)'});

function rtRecalcFromInputs(no){
  const r = RT(no); if(!r) return;
  document.querySelectorAll('[data-rt-amt]').forEach(inp=>{ r.amt[inp.dataset.rtAmt] = Number(toHalf(inp.value))||0; });
  if(r.way==='換貨' && r.exchange){
    const exTotal = r.exchange.lines.reduce((s,l)=>{ const p=P(l.id); return s+(p?p.price*(Number(l.qty)||0):0); },0);
    r.amt.newOffset = Math.max(0, Math.min(exTotal, r.amt.total - r.amt.fee - r.amt.reissueFee));
  }
}
function rtSave(no){
  const r = RT(no); if(!r) return;

function rtAgree(no, bySystem){
  const r = RT(no); if(!r || r.status!=='確認中') return;
  r.status = '處理中';
  r.changes.push({t:'狀態變更', at:new Date(), by:bySystem?'SYSTEM':state.user.id, before:'確認中', after:'處理中('+(bySystem?'顧客於 email 點擊【同意】':'人工操作:顧客同意')+');票券已鎖定不可使用,發票由系統自動折讓'});
  const inv = r.orderNo ? INVOICES.find(i=>i.orderNo===r.orderNo && ['已開立','部分折讓'].includes(i.status)) : null;
  if(inv && r.way==='退款'){
    const nowd = new Date();
    const crn = 'CR'+ymd(nowd)+String(101+inv.allow.length).slice(-3);
    inv.allow.push({no:crn, reason:'退貨折讓(退貨單 '+r.no+')', items:[{name:'退貨折讓', qty:r.qty, amt:r.amt.total}], sub:r.amt.total, date:nowd, by:'SYSTEM'});
    const after = inv.total - inv.allow.reduce((s,a)=>s+a.sub,0);
    inv.status = after<=0 ? '全額折讓' : '部分折讓';
    inv.history.push({st:inv.status, at:nowd, by:'SYSTEM', note:'折讓證明單 '+crn+'(退貨自動折讓 '+fm(r.amt.total)+')'});
    const o = ORD(r.orderNo); if(o) o.invStatus = inv.status;
  }
  syncOrderRet(r);
  toast('退貨單 '+no+' 轉【處理中】;票券鎖定、發票自動折讓(如適用)','ok',4400); rerender();
}

function annSorted(list){
  return [...list].sort((a,b)=>{

    const sA = a.sort==null?Infinity:a.sort, sB = b.sort==null?Infinity:b.sort;
    if(sA!==sB) return sA-sB;
    return b.createdAt-a.createdAt;
  });
}

function annSave(type, id){
  const d = state.annDraft, list = type==='g'?ANNS_GENERAL:ANNS_BOARD;
  if(!d.title.trim()){ toast('請填寫標題','err'); return; }
  if(type==='g' && !d.content.trim()){ toast('請填寫內容','err'); return; }
  if(type==='b' && !d.img){ toast('請上傳圖片(每個公告需一張圖片)','err'); return; }
  const on = new Date((d.onAt||'').replace(/-/g,'/'));
  if(!d.onAt || isNaN(on)){ toast('上架時間為必填,格式 YYYY-MM-DD hh:mm','err'); return; }
  const off = d.offAt ? new Date(d.offAt.replace(/-/g,'/')) : null;
  if(off && isNaN(off)){ toast('下架時間格式有誤','err'); return; }
  if(off && off<on){ toast('下架時間不可早於上架時間','err'); return; }
  if(d.sort && !vPosInt(d.sort)){ toast('排序僅能填寫正整數','err'); return; }
  const now = new Date();
  if(id==='new'){
    list.push({ id:type+Math.random().toString(36).slice(2,6), sort:d.sort?Number(d.sort):null, title:d.title.trim(), content:d.content, img:d.img, onAt:on, offAt:off, status:d.status, createdBy:state.user.id, createdAt:now, updBy:state.user.id, updAt:now });
    ANN_CHANGES.unshift({at:now, by:state.user.id, field:(type==='g'?'一般':'蓋板')+'公告「'+d.title.trim()+'」', before:'-', after:'新增'});
  } else {
    const a = list.find(x=>x.id===id);
    ANN_CHANGES.unshift({at:now, by:state.user.id, field:(type==='g'?'一般':'蓋板')+'公告「'+a.title+'」', before:'上架 '+fmtDM(a.onAt)+' / '+a.status, after:'上架 '+fmtDM(on)+' / '+d.status});
    Object.assign(a, { sort:d.sort?Number(d.sort):null, title:d.title.trim(), content:d.content, img:d.img, onAt:on, offAt:off, status:d.status, updBy:state.user.id, updAt:now });
  }
  state.annDraft = null;
  toast('公告已儲存'+(on<=now&&d.status==='啟用'?',已立即在前台生效':''),'ok');
  nav('#/anns');
}

document.addEventListener('change', e => {
  const t = e.target;
  /* 專用分支一律排在通用分支之前(委派順序陷阱) */
  if(t.dataset.ocCk!==undefined){ setPath(state.oc, t.dataset.ocCk, t.checked); return; }
  if(t.dataset.ocCh!==undefined){
    const k = t.dataset.ocCh;
    if(k==='cust'){ state.oc.cust = t.value; if(t.value) ocFillFromCust(t.value); }
    else if(k==='si.city'){ state.oc.si.city = t.value; state.oc.si.dist = ''; }
    else if(k==='payKind'){ state.oc.payKind = t.value; state.oc.payMethod = (PAY_MAP[t.value]||[''])[0]; }
    else setPath(state.oc, k, t.value);
    rerender(); return; }
  if(t.dataset.ocLine!==undefined){ state.oc.lines[Number(t.dataset.ocLine)].pid = t.value; rerender(); return; }
  if(t.dataset.ocQty!==undefined){ state.oc.lines[Number(t.dataset.ocQty)].qty = toHalf(t.value); rerender(); return; }
  if(t.dataset.oc!==undefined){ setPath(state.oc, t.dataset.oc, toHalf(t.value));
    if(t.dataset.oc==='premium' || t.dataset.oc==='retNo'){ ocRetLookup(); rerender(); } return; }
  if(t.dataset.rrCh!==undefined){ state.reissue[t.dataset.rrCh] = t.value; rerender(); return; }
  if(t.dataset.rr!==undefined){ state.reissue[t.dataset.rr] = toHalf(t.value); rerender(); return; }
  if(t.dataset.riLine!==undefined){ const l = state.reissue.lines[Number(t.dataset.riLine)]; l[t.dataset.k] = toHalf(t.value); rerender(); return; }
  if(t.dataset.alPick!==undefined){ state.allowDraft.picks[Number(t.dataset.alPick)].on = t.checked; rerender(); return; }
  if(t.dataset.alLine!==undefined){ const p = state.allowDraft.picks[Number(t.dataset.alLine)]; p[t.dataset.k] = toHalf(t.value); rerender(); return; }
  if(t.dataset.alCustom!==undefined){ const c = state.allowDraft.custom[Number(t.dataset.alCustom)]; c[t.dataset.k] = toHalf(t.value); rerender(); return; }
  if(t.dataset.al!==undefined){ state.allowDraft[t.dataset.al] = t.value; return; }
  if(t.dataset.rtCh!==undefined){ const r = RT(CUR_ARG); if(!r) return;
    if(t.dataset.rtCh==='way'){ r.way = t.value; if(r.way==='換貨' && !r.exchange) r.exchange = {wh:'總部倉', lines:[{id:'', qty:''}]}; if(r.way==='退款') r.amt.newOffset = 0; }
    else if(t.dataset.rtCh==='exwh'){ r.exchange.wh = t.value; }
    rtRecalcFromInputs(CUR_ARG); rerender(); return; }
  if(t.dataset.rt!==undefined){ const r = RT(CUR_ARG); if(r){ r[t.dataset.rt] = t.value; rerender(); } return; }
  if(t.dataset.rtExp!==undefined){ const r = RT(CUR_ARG); r.exchange.lines[Number(t.dataset.rtExp)].id = t.value; rtRecalcFromInputs(CUR_ARG); rerender(); return; }
  if(t.dataset.rtExq!==undefined){ const r = RT(CUR_ARG); r.exchange.lines[Number(t.dataset.rtExq)].qty = toHalf(t.value); rtRecalcFromInputs(CUR_ARG); rerender(); return; }
  if(t.dataset.rtAmt!==undefined){ rtRecalcFromInputs(CUR_ARG); rerender(); return; }
  if(t.dataset.annCh!==undefined){ state.annDraft[t.dataset.annCh] = t.value; rerender(); return; }
  if(t.dataset.ann!==undefined){ state.annDraft[t.dataset.ann] = t.value; rerender(); return; }
  if(t.dataset.artCh!==undefined){ state.artDraft[t.dataset.artCh] = t.value; rerender(); return; }
  if(t.dataset.fin!==undefined && t.tagName==='SELECT'){ state.filters.inv[t.dataset.fin] = t.value; rerender(); return; }
  if(t.dataset.foCh!==undefined){ state.filters.ord[t.dataset.foCh] = t.value; rerender(); return; }
  if(t.dataset.frCh!==undefined){ state.filters.ret[t.dataset.frCh] = t.value; rerender(); return; }
  if(t.dataset.faCh!==undefined){ state.filters.ann[t.dataset.faCh] = t.value; rerender(); return; }
  const ach = t.dataset.actionCh;
  if(ach==='per'){ state.per[t.dataset.list] = Number(t.value); state.page[t.dataset.list] = 1; rerender(); return; }
  if(ach==='fee-mode'){ FEES[Number(t.dataset.i)].mode = t.value; rerender(); return; }
});

document.addEventListener('input', e => {
  const t = e.target;
  if(t.dataset.oc!==undefined){ setPath(state.oc, t.dataset.oc, t.value); return; }
  if(t.dataset.ocQty!==undefined){ state.oc.lines[Number(t.dataset.ocQty)].qty = t.value; return; }
  if(t.dataset.rr!==undefined && t.tagName==='INPUT'){ state.reissue[t.dataset.rr] = t.value; return; }
  if(t.dataset.riLine!==undefined){ const l = state.reissue.lines[Number(t.dataset.riLine)]; l[t.dataset.k] = t.value; return; }
  if(t.dataset.alLine!==undefined){ const p = state.allowDraft.picks[Number(t.dataset.alLine)]; p[t.dataset.k] = t.value; return; }
  if(t.dataset.alCustom!==undefined){ const c = state.allowDraft.custom[Number(t.dataset.alCustom)]; c[t.dataset.k] = t.value; return; }
  if(t.dataset.al!==undefined){ state.allowDraft[t.dataset.al] = t.value; return; }
  if(t.dataset.ann!==undefined){ state.annDraft[t.dataset.ann] = t.value;
    if(t.dataset.ann==='content'){ const note = t.closest('.field')?.querySelector('.cnt-note'); if(note){ const len = [...t.value].length; note.textContent = `${len} / 100 字${len>=100?'(已達上限,無法繼續輸入)':''}`; note.classList.toggle('over', len>=100); } } return; }
  if(t.dataset.art!==undefined){ state.artDraft[t.dataset.art] = t.value; return; }
  if(t.dataset.artBlk!==undefined){ state.artDraft.blocks[Number(t.dataset.artBlk)].v = t.value; return; }
  if(t.dataset.rtExq!==undefined){ const r = RT(CUR_ARG); if(r) r.exchange.lines[Number(t.dataset.rtExq)].qty = t.value; return; }
  if(t.dataset.fin!==undefined){ state.filters.inv[t.dataset.fin] = t.value; return; }
  if(t.dataset.fo!==undefined){ state.filters.ord[t.dataset.fo] = t.value; return; }
  if(t.dataset.fr!==undefined){ state.filters.ret[t.dataset.fr] = t.value; return; }
  if(t.dataset.fa!==undefined){ state.filters.ann[t.dataset.fa] = t.value; return; }
  if(t.id==='cf-email'){ state.filters.cust.email = t.value; return; }
  if(t.id==='cf-taxid'){ state.filters.cust.taxid = t.value; return; }
});

document.addEventListener('blur', e => {
  const t = e.target;
  if(!t.matches || !t.matches('input,textarea') || t.type==='password') return;
  const half = toHalf(t.value);
  if(half !== t.value){
    t.value = half;
    if(t.dataset.oc!==undefined) setPath(state.oc, t.dataset.oc, half);
    if(t.dataset.rr!==undefined) state.reissue && (state.reissue[t.dataset.rr] = half);
  }
  if(t.dataset.vald){
    const v = t.value.trim();
    const wrap = t.closest('.field'); const msgEl = wrap ? wrap.querySelector('.fmsg') : null;
    if(!msgEl) return;
    if(!v){ msgEl.className = 'fmsg'; return; }
    const ok = t.dataset.vald==='taxid' ? vTaxId(v) : t.dataset.vald==='mobile' ? vMobile(v) : t.dataset.vald==='carrier' ? vCarrier(v) : true;
    msgEl.className = 'fmsg show ' + (ok?'good':'bad');
    msgEl.textContent = ok ? '✓ 格式正確' : (t.dataset.vald==='taxid' ? '格式不符,請重新輸入' : '格式不符,請重新輸入');
  }
}, true);

document.addEventListener('keydown', e => {
  if(e.key==='Enter' && (e.target.id==='lg-pw' || e.target.id==='lg-id')){ e.preventDefault(); doLogin(); }
});

function ocRetLookup(){
  const oc = state.oc; if(!oc || oc.payKind!=='換貨'){ return; }
  const rt = RT(toHalf((oc.retNo||'').trim()));
  oc.retAmt = rt ? Math.max(0, rt.amt.total - rt.amt.fee - rt.amt.reissueFee) : 0;
}
function resetDrafts(){
  state.oc = null; state.reissue = null; state.allowDraft = null; state.annDraft = null;
  state.artDraft = null; state.artEditId = null; state.faqEditId = null;
  state.filters = {}; state.page = {}; state.tab = {}; state.unlocked = {};
  state.faqOpenIds.clear(); state.artOpenIds.clear();
}

/* ================================================================
   Router 與啟動
   ================================================================ */
function nav(to){ if(location.hash===to){ route(); } else location.hash = to; }
function route(){
  const h = location.hash || '#/login';
  closeModal(); $('#drawerRoot').innerHTML = '';
  state.notifOpen = false; state.sideOpen = false;
  state.unlocked = {}; state.ordStExp = false; state.faqEditId = null;
  window.scrollTo(0,0);
  if(!state.user){ if(h!=='#/login'){ location.hash = '#/login'; return; } renderLogin(); return; }
  if(h==='#/login'){ location.hash = '#/home'; return; }
  const mod = routeMod(h);
  if(!canAccess(mod)){
    toast('您的群組('+state.user.group+')沒有【'+((MODULES.find(m=>m.key===mod)||{}).name||mod)+'】的使用權限','err',4600);
    if(h!=='#/home'){ location.hash = '#/home'; return; }
  }
  const seg = h.split('/');
  if(h==='#/home') renderHome();
  else if(h==='#/accounts') renderAccounts();
  else if(h==='#/perms') renderPerms();
  else if(h==='#/customers') renderCustomers();
  else if(h.startsWith('#/customer/')) renderCustomerDetail(seg[2]);
  else if(h==='#/logistics') renderLogistics();
  else if(h==='#/holidays') renderHolidays();
  else if(h==='#/invoices') renderInvoices();
  else if(h.startsWith('#/invoice-reissue/')) renderReissue(seg[2]);
  else if(h.startsWith('#/invoice-allowance/')) renderAllowance(seg[2]);
  else if(h.startsWith('#/invoice/')) renderInvoiceDetail(seg[2]);
  else if(h==='#/fees') renderFees();
  else if(h==='#/orders') renderOrders();
  else if(h==='#/order-create') renderOrderCreate();
  else if(h.startsWith('#/order/')) renderOrderDetail(seg[2]);
  else if(h==='#/returns') renderReturns();
  else if(h.startsWith('#/return-app/')) renderReturnApp(seg[2]);
  else if(h.startsWith('#/return-note/')) renderReturnNote(seg[2]);
  else if(h==='#/anns') renderAnns();
  else if(h.startsWith('#/ann-edit/')) renderAnnEdit(seg[2], seg[3]);
  else if(h==='#/faqcats') renderFaqCats();
  else if(h.startsWith('#/faqcat/')) renderFaqCat(seg[2]);
  else if(h==='#/footcats') renderFootCats();
  else if(h.startsWith('#/footcat/')) renderFootCat(seg[2]);
  else if(h.startsWith('#/footinfo/')) renderFootInfo(seg[2]);
  else renderHome();
}
window.addEventListener('hashchange', route);
if(location.hash && location.hash!=='#/login') location.hash = '#/login';
route();
</script>
</body>
</html>
